version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Server
      - PORT=3000
      - NODE_ENV=production
      # Database — use non-VITE_ names for server-side runtime
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      # Keep VITE_ aliases for backward compatibility (both are read by the code)
      - VITE_SUPABASE_URL=${SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      # Scrapling sidecar URL (points to sibling container)
      - SCRAPLING_SIDECAR_URL=http://scrapling:5000
      # Optional: PageSpeed Insights API key
      - PAGESPEED_API_KEY=${PAGESPEED_API_KEY:-}
    depends_on:
      scrapling:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  scrapling:
    build:
      context: ./scrapling-sidecar
    ports:
      - "${SIDECAR_PORT:-5000}:5000"
    environment:
      - SIDECAR_PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
