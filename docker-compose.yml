version: "3.8"

services:

  # ── PostgreSQL database ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seo_analyzer}
      POSTGRES_USER: ${POSTGRES_USER:-seo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-run schema on first boot (creates tables)
      - ./supabase/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seo_user} -d ${POSTGRES_DB:-seo_analyzer}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Node.js app ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      # PostgreSQL connection string (points to sibling container)
      DATABASE_URL: postgresql://${POSTGRES_USER:-seo_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-seo_analyzer}
      # Scrapling sidecar
      SCRAPLING_SIDECAR_URL: http://scrapling:5000
      # Optional: PageSpeed Insights API key
      PAGESPEED_API_KEY: ${PAGESPEED_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      scrapling:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── Python Scrapling sidecar ─────────────────────────────────────
  scrapling:
    build:
      context: ./scrapling-sidecar
    restart: unless-stopped
    environment:
      # Limit parallel headless sessions to avoid OOM; increase if host has ≥8 GB RAM
      MAX_STEALTH_CONCURRENT: ${MAX_STEALTH_CONCURRENT:-2}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      # Longer start_period: browser binary init takes several seconds on first run
      start_period: 60s
      retries: 5

volumes:
  postgres_data:
